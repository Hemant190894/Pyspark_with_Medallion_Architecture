services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: >
      bash -c "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./app:/opt/spark-app
      - ./data:/opt/spark-data

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out"
    ports:
      - "8081:8081"
      - "4040:4040"
    depends_on:
      - spark-master
    volumes:
      - ./app:/opt/spark-app
      - ./data:/opt/spark-data

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out"
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    volumes:
      - ./app:/opt/spark-app
      - ./data:/opt/spark-data

  minio:
    image: minio/minio
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin password123) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb myminio/warehouse || true;
      exit 0;
      "

  postgres:
    image: postgres:13
    container_name: airflow-postgres
    hostname: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname Hemant --lastname Dayma --role Admin --email admin@example.com --password admin || true && airflow webserver"
    depends_on:
      - postgres
      - minio
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=medallion_architecture_key_123
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata

    ports:
      - "8085:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./config.ini:/opt/airflow/config.ini
      - .:/opt/airflow/scripts
      - ./spark_ivy_cache:/home/airflow/.ivy2/cache

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      - postgres
      - minio
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=medallion_architecture_key_123
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=Asia/Kolkata  # YE ADD KAREIN
      - TZ=Asia/Kolkata
    volumes:
      - ./dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./config.ini:/opt/airflow/config.ini
      - .:/opt/airflow/scripts
      - ./spark_ivy_cache:/home/airflow/.ivy2/cache
    command: scheduler

volumes:
  minio_data: